server {
    listen 80;
    server_name _;

    root /usr/share/webapps/cgit;
    client_max_body_size 50m;

    # Static files + cgit CGI fallback
    location / {
        try_files $uri @cgit;
    }

    location @cgit {
        fastcgi_pass unix:/run/fcgiwrap.sock;
        fastcgi_param SCRIPT_FILENAME /usr/share/webapps/cgit/cgit.cgi;
        fastcgi_param PATH_INFO       $uri;
        fastcgi_param QUERY_STRING    $args;
        fastcgi_param HTTP_HOST       $server_name;
        include fastcgi_params;
    }

    # Strip .git suffix for browser visitors
    location ~ ^/(.+)\.git$ {
        return 302 /$1;
    }

    # Smart HTTP clone — normalize .git suffix in URL to match disk layout
    # Both /repo.git/info/refs and /repo/info/refs resolve to /var/lib/git/repo
    location ~ ^/(.+?)(\.git)?/(info/refs|git-upload-pack)$ {
        fastcgi_pass unix:/run/fcgiwrap.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /usr/libexec/git-core/git-http-backend;
        fastcgi_param GIT_PROJECT_ROOT /var/lib/git;
        fastcgi_param GIT_HTTP_EXPORT_ALL 1;
        fastcgi_param SCRIPT_NAME        /$1;
        fastcgi_param PATH_INFO          /$1/$3;
        fastcgi_param QUERY_STRING       $args;

        # Fix EOF on remote clone: disable buffering
        fastcgi_buffering off;
        fastcgi_read_timeout 300;
    }
}
